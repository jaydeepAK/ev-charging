services:
  - type: web
    name: ev-charging-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false   # pooled (Supavisor) connection string — set manually in Render dashboard
      - key: DIRECT_URL
        sync: false   # session-mode pooler string, used only for migrate deploy
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000  # Render's default internal port; it maps this to https for you
